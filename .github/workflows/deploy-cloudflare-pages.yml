name: Deploy to Cloudflare Worker

# Uses Wrangler (same as `npm run deploy` locally).
on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: cloudflare-worker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build and deploy
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20.18.1"
          cache: npm

      - name: Install and build
        run: npm ci && npm run build
        env:
          PUBLIC_SITE_URL: https://www.feedforwardclub.com
          PUBLIC_APPLY_ENDPOINT: https://api.feedforwardclub.com/apply
          PUBLIC_CONTACT_ENDPOINT: https://api.feedforwardclub.com/contact

      - name: Publish to Cloudflare Worker
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4"
          command: deploy
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
