<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" role="img" aria-labelledby="title desc">
  <title id="title">FeedForwardClub logo</title>
  <desc id="desc">Stylized FF monogram with arrow, feedforwardclub wordmark, and slogan Grow. Connect. Build.</desc>
  <rect width="100%" height="100%" fill="#ffffff"/>

  <!-- Monogram rebuilt as direct vector shapes -->
  <g fill="#000000">
    <!-- Left F -->
    <path d="M560 205
             L725 205
             L710 255
             L630 255
             L615 310
             L700 310
             L685 360
             L600 360
             L570 470
             L500 470
             Z"/>
    <!-- Right F -->
    <path d="M760 205
             L925 205
             L910 255
             L830 255
             L815 310
             L900 310
             L885 360
             L800 360
             L770 470
             L700 470
             Z"/>
    <!-- Arrow -->
    <path d="M930 310
             L1010 310
             L1010 275
             L1090 330
             L1010 385
             L1010 350
             L920 350
             Z"/>
  </g>

  <!-- Wordmark -->
  <g text-anchor="middle" fill="#000000">
    <text x="800" y="615"
          font-family="Avenir Next, Gotham, Montserrat, Helvetica Neue, Arial, sans-serif"
          font-size="102">
      <tspan font-weight="300">feed</tspan><tspan font-weight="800">forward</tspan><tspan font-weight="300">club</tspan>
    </text>

    <text x="800" y="705"
          font-family="Avenir Next, Gotham, Montserrat, Helvetica Neue, Arial, sans-serif"
          font-size="38"
          font-weight="400"
          letter-spacing="12"
          fill="#111111">GROW. CONNECT. BUILD.</text>
  </g>
</svg>
