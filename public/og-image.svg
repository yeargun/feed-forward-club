<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="halo" cx="80%" cy="25%" r="55%">
      <stop offset="0%" stop-color="#31548F" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#1F3A68" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="halo2" cx="10%" cy="90%" r="45%">
      <stop offset="0%" stop-color="#B87328" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#1F3A68" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="#1F3A68"/>
  <rect width="1200" height="630" fill="url(#halo)"/>
  <rect width="1200" height="630" fill="url(#halo2)"/>

  <!-- logo mark -->
  <g transform="translate(80,80)">
    <rect width="44" height="44" rx="10" fill="#F4F0E6"/>
    <path d="M13 9h18v5H18v7h10v5H18v12h-5V9z" fill="#1F3A68"/>
  </g>
  <text x="144" y="112" font-family="'Plus Jakarta Sans', ui-sans-serif, system-ui, sans-serif"
        font-size="26" font-weight="600" fill="#F4F0E6" letter-spacing="0">
    FeedForwardClub
  </text>

  <!-- headline -->
  <text x="80" y="340" font-family="'Source Serif 4', Georgia, serif"
        font-size="96" font-weight="600" fill="#F4F0E6" letter-spacing="-2">
    A founders' circle for
  </text>
  <text x="80" y="450" font-family="'Source Serif 4', Georgia, serif"
        font-size="96" font-weight="600" font-style="italic" fill="#B87328" letter-spacing="-2">
